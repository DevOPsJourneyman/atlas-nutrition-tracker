name: CI

on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          push: false
          load: true
          tags: devopsjourneyman/atlas-nutrition-tracker:test
      - name: Run container
        run: docker run -d -p 5000:5000 --name atlas-nutrition-tracker-test devopsjourneyman/atlas-nutrition-tracker:test
      - name: Wait for container
        run: sleep 3
      - name: Smoke test
        run: curl --fail http://localhost:5000
      - name: Stop container
        run: docker stop atlas-nutrition-tracker-test

  push:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: devopsjourneyman/atlas-nutrition-tracker:latest
          # push 01