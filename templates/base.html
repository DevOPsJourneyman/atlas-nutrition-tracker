<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Nutrition — {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f0e;
            --bg2: #141714;
            --bg3: #1c201b;
            --border: #2a2e29;
            --green: #4ade80;
            --green-dim: #166534;
            --amber: #fb923c;
            --red: #f87171;
            --text: #e8ebe7;
            --text-dim: #7a8578;
            --accent: #4ade80;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            font-size: 15px;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Nav */
        nav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 1.25rem;
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            height: 52px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.05em;
            margin-right: 1.5rem;
            white-space: nowrap;
        }

        nav a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 0 0.75rem;
            height: 52px;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            white-space: nowrap;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            border-bottom-color: var(--green);
        }

        /* Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem 1.25rem;
        }

        /* Page header */
        .page-header {
            margin-bottom: 1.5rem;
        }

        .page-header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .page-header p {
            color: var(--text-dim);
            font-size: 13px;
            margin-top: 0.25rem;
        }

        /* Cards */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        .card h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 1rem;
        }

        /* Macro bar */
        .macro-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .macro-pill {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 0.75rem;
            text-align: center;
            flex: 1;
            min-width: 80px;
        }

        .macro-pill .value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--green);
        }

        .macro-pill .label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-top: 2px;
        }

        /* Target range indicator */
        .target-ok { color: var(--green); }
        .target-warn { color: var(--amber); }
        .target-low { color: var(--red); }

        /* Meal list */
        .meal-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            background: var(--bg3);
        }

        .meal-item.eaten {
            opacity: 0.5;
            border-color: var(--green-dim);
        }

        .meal-item .meal-name {
            flex: 1;
            font-weight: 500;
            font-size: 14px;
        }

        .meal-item .meal-macros {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            text-align: right;
        }

        .meal-badge {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-smoothie { background: #1a3a2a; color: #4ade80; }
        .badge-cooked { background: #2a1a0a; color: #fb923c; }
        .badge-salad { background: #1a2a3a; color: #60a5fa; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn-primary {
            background: var(--green);
            color: #0d0f0e;
            font-weight: 600;
        }

        .btn-primary:hover { background: #22c55e; }

        .btn-ghost {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

        .btn-sm {
            padding: 0.3rem 0.6rem;
            font-size: 12px;
        }

        .btn-danger {
            background: transparent;
            color: var(--red);
            border: 1px solid #3a1a1a;
        }

        /* Forms */
        select, input[type="number"], input[type="text"] {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 0.5rem 0.75rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            width: 100%;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--green);
        }

        label {
            font-size: 12px;
            color: var(--text-dim);
            display: block;
            margin-bottom: 0.35rem;
            font-weight: 500;
        }

        .form-group { margin-bottom: 0.75rem; }

        .form-row {
            display: flex;
            gap: 0.75rem;
        }

        .form-row .form-group { flex: 1; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            text-align: left;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.6rem 0.75rem;
            font-size: 14px;
            border-bottom: 1px solid var(--bg3);
        }

        tr:last-child td { border-bottom: none; }

        /* Divider */
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1rem 0;
        }

        /* Store tag */
        .store-tag {
            font-size: 10px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 1px 5px;
            color: var(--text-dim);
        }

        /* Eaten checkmark */
        .check-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .check-btn:hover { border-color: var(--green); color: var(--green); }
        .check-btn.checked { background: var(--green-dim); border-color: var(--green); color: var(--green); }

        /* Alert */
        .alert {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .alert-info {
            background: #1a2a3a;
            border: 1px solid #1e4a6a;
            color: #93c5fd;
        }

        /* Shopping list specifics */
        .shop-section-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--green);
            padding: 0.5rem 0;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid var(--green-dim);
        }

        .cost-total {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--green);
        }
    </style>
</head>
<body>
    <nav>
        <span class="nav-brand">⬡ ATLAS</span>
        <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Today</a>
        <a href="/shopping-list" {% if request.endpoint == 'shopping_list' %}class="active"{% endif %}>Shopping</a>
        <a href="/stock" {% if request.endpoint == 'stock' %}class="active"{% endif %}>Stock</a>
        <a href="/spending" {% if request.endpoint == 'spending' %}class="active"{% endif %}>Spending</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
